<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aronn Bots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1c2c 0%, #0f111a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        .bots-card {
            background: rgba(30, 33, 43, 0.95);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .header p {
            color: #8e9297;
            font-size: 18px;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 100%;
            padding: 0 20px;
        }

        .bot-button {
            flex: 1;
            min-width: 200px;
            max-width: 280px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7289da 0%, #5865f2 100%);
            color: white;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .bot-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
            background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
        }

        .bot-button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(88, 101, 242, 0.4);
        }

        .button-icon {
            font-size: 32px;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .bots-card {
                padding: 25px 15px;
            }

            .header h1 {
                font-size: 28px;
            }

            .header p {
                font-size: 16px;
            }

            .buttons-container {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
                padding: 0 15px;
            }

            .bot-button {
                width: 100%;
                max-width: none;
                min-width: 0;
                padding: 15px;
                font-size: 16px;
            }

            .back-button {
                top: 10px;
                left: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-button">
        ← Vissza
    </a>
    <div class="container">
        <div class="bots-card">
            <div class="header">
                <h1>Aronn Bots</h1>
                <p>Válassz az alábbi lehetőségek közül</p>
            </div>
            <div class="buttons-container">
                <a href="terms-of-service" class="bot-button">
                    <span class="button-icon">📜</span>
                    Szolgáltatási feltételek
                </a>
                <a href="privacy-policy" class="bot-button">
                    <span class="button-icon">🔒</span>
                    Adatvédelmi szabályzat
                </a>
            </div>
        </div>
    </div>
</body>
</html>

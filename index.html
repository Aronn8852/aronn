<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aronn</title>
    <link rel="icon" href="aronn.png" type="image/png">
</head>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: linear-gradient(135deg, #1a1c2c 0%, #0f111a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    padding: 20px;
    width: 100%;
    max-width: 500px !important;
}

.profile-card {
    background: rgba(30, 33, 43, 0.95);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.avatar-container {
    position: relative;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid #2f3241;
}

.status {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 4px solid #1e212b;
}

.status.online {
    background-color: #43b581;
}

.username {
    color: #ffffff;
    word-break: break-all;
    font-size: 24px;
    font-weight: 600;
}

.roles {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

.role {
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    color: white;
    text-decoration: none;
    transition: transform 0.2s ease, filter 0.2s ease;
}

.role-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.role.owner {
    background: rgba(255, 69, 58, 0.2);
}
.role.owner .role-dot {
    background: #ff453a;
}

.role.admin {
    background: rgba(48, 209, 88, 0.2);
}
.role.admin .role-dot {
    background: #30d158;
}

.role.staff {
    background: rgba(94, 92, 230, 0.2);
}
.role.staff .role-dot {
    background: #5e5ce6;
}

.role.developer {
    background: rgba(255, 146, 43, 0.2);
}
.role.developer .role-dot {
    background: #ff922b;
}

.role.moderator {
    background: rgba(66, 135, 245, 0.2);
}
.role.moderator .role-dot {
    background: #4287f5;
}

.role.helper {
    background: rgba(190, 75, 219, 0.2);
}
.role.helper .role-dot {
    background: #be4bdb;
}

.status-message {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    color: #8e9297;
    font-size: 14px;
}

.status-message p {
    transition: opacity 0.3s ease;
}

.aronn-bots-button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #7289da 0%, #5865f2 100%);
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
}

.aronn-bots-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
    background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
}

.aronn-bots-button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(88, 101, 242, 0.4);
}

.button-icon {
    font-size: 20px;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.role:hover {
    animation: pulse 0.5s ease-in-out;
    cursor: pointer;
    filter: brightness(1.2);
}

@media (max-width: 480px) {
    .container {
        padding: 10px;
        max-width: 100%;
    }
    
    .profile-card {
        padding: 20px 15px;
    }
    
    .profile-header {
        flex-direction: column;
        text-align: center;
        gap: 15px;
    }
    
    .username {
        font-size: 20px;
    }
    
    .roles {
        justify-content: center;
    }

    .aronn-bots-button {
        width: 100%;
        padding: 10px 20px;
        font-size: 14px;
    }
}

@media (max-width: 350px) {
    .avatar {
        width: 70px;
        height: 70px;
    }
    
    .role {
        padding: 6px 12px;
        font-size: 12px;
    }
    
    .status-message {
        padding: 12px;
        font-size: 12px;
    }
}

@media (min-width: 481px) and (max-width: 768px) {
    .container {
        max-width: 90%;
    }
}

@media (orientation: landscape) and (max-height: 500px) {
    .container {
        padding: 10px;
        max-height: 90vh;
        overflow-y: auto;
    }
    
    .profile-card {
        padding: 15px;
    }
}
</style>

<body>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="aronn.png" alt="Profile Picture" class="avatar">
                    <div class="status online"></div>
                </div>
                <h1 class="username">Aronn (.aronn.)</h1>
            </div>
            <div class="roles">
                <a href="https://discord.com/invite/tjcQnnJt8H" target="_blank" class="role owner">
                    <span class="role-dot"></span>
                    Tulaj @ Aronn közössége
                </a>
                <a href="https://discord.com/invite/tjcQnnJt8H" target="_blank" class="role owner">
                    <span class="role-dot"></span>
                    Tulaj @ Mcstatus.hu
                </a>
                <a href="https://discord.gg/wb8tPXDRf5" target="_blank" class="role staff">
                    <span class="role-dot"></span>
                    Staff @ Turulcraft
                </a>
                <a href="https://discord.gg/t24agXyb5Q" target="_blank" class="role moderator">
                    <span class="role-dot"></span>
                    Moderatór @ Frostbite Crew
                </a>
            </div>
            <div class="status-message">
                <p>🎮 Jelenleg nézi: Gyere be! dc.aronn.hu </p>
            </div>
            <a href="bots/index" class="aronn-bots-button">
                <span class="button-icon">🤖</span>
                Aronn bots
            </a>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
